<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Explorer - Plagiarism Checker</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary premium-nav shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-shield-check me-2" viewBox="0 0 16 16">
                  <path d="M5.338 1.59a61.44 61.44 0 0 0-2.837.856.481.481 0 0 0-.328.39c-.554 4.157.726 7.19 2.253 9.188a10.725 10.725 0 0 0 2.287 2.233c.346.244.652.42.893.533.12.057.218.095.293.118a.55.55 0 0 0 .101.025.615.615 0 0 0 .1-.025c.076-.023.174-.061.294-.118.24-.113.547-.29.893-.533a10.726 10.726 0 0 0 2.287-2.233c1.527-1.997 2.807-5.031 2.253-9.188a.48.48 0 0 0-.328-.39c-.651-.213-1.75-.56-2.837-.855C9.552 1.29 8.531 1.067 8 1.067c-.53 0-1.552.223-2.662.524zM5.072.56C6.157.265 7.31 0 8 0s1.843.265 2.928.56c1.11.3 2.229.655 2.887.87a1.54 1.54 0 0 1 1.044 1.262c.596 4.477-.787 7.795-2.465 9.99a11.775 11.775 0 0 1-2.517 2.453 7.159 7.159 0 0 1-1.048.625c-.28.132-.581.24-.829.24s-.548-.108-.829-.24a7.158 7.158 0 0 1-1.048-.625 11.777 11.777 0 0 1-2.517-2.453C1.928 10.487.545 7.169 1.141 2.692A1.54 1.54 0 0 1 2.185 1.43 62.456 62.456 0 0 1 5.072.56z"/>
                  <path d="M10.854 5.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 7.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                </svg>
                Plagiarism Checker
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Cek Dokumen</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-bold" href="/database">Database Explorer</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5 animate-slide-up">
        <div class="row align-items-center mb-5">
            <div class="col-md-6">
                <h2 class="fw-bold text-gradient mb-2">Database Explorer</h2>
                <p class="text-muted">Jelajahi seluruh koleksi jurnal akademik yang telah dikumpulkan.</p>
            </div>
            <div class="col-md-6">
                <div class="search-box position-relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="var(--text-secondary)" class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3" viewBox="0 0 16 16">
                      <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                    </svg>
                    <input type="text" id="searchInput" class="form-control rounded-pill ps-5 py-3 border-0" placeholder="Cari judul, abstrak, atau penulis...">
                </div>
            </div>
        </div>

        <!-- Stats Overview -->
        <div class="row mb-4 delay-100">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center bg-transparent border border-secondary rounded-4 p-3 px-4">
                    <span class="text-secondary fw-medium">Menampilkan: <span id="currentRange" class="text-primary fw-bold">0-0</span></span>
                    <span class="badge badge-accent-glow rounded-pill px-3 py-2 fs-6">Total: <span id="totalPapers">0</span> Jurnal</span>
                </div>
            </div>
        </div>

        <!-- Lottie Animation Container (Loading / Empty States) -->
        <div id="animationContainer" class="text-center my-5 py-5 d-none">
            <lottie-player id="lottiePlayer" background="transparent" speed="1" style="width: 300px; height: 300px; margin: 0 auto;" loop autoplay></lottie-player>
            <h4 id="animationMessage" class="fw-bold text-muted mt-3">Memuat Data...</h4>
        </div>

        <!-- Papers Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 mb-5" id="papersGrid">
            <!-- Paper cards will be injected here via JS -->
        </div>

        <!-- Pagination -->
        <div class="d-flex justify-content-between align-items-center mt-4 d-none" id="paginationWrapper">
            <button class="btn btn-outline-primary rounded-pill px-4" id="prevBtn" disabled>
                <i class="bi bi-arrow-left"></i> Sebelumnya
            </button>
            <span class="text-muted fw-medium">Halaman <span id="currentPage">1</span></span>
            <button class="btn btn-outline-primary rounded-pill px-4" id="nextBtn">
                Selanjutnya <i class="bi bi-arrow-right"></i>
            </button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/database.js"></script>
</body>
</html>
